# Ingress NGINX configuration
# ingress-nginx controller v1.13.2+ includes fix to allow '.' in Exact/Prefix
# paths under strict validation, required for ACME HTTP-01:
# "/.well-known/acme-challenge/*"
ingress_nginx_chart_version: "4.15.1"

# Controller configuration
ingress_nginx_controller_replicas: 1
ingress_nginx_controller_resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Keep strict validation enabled (safe with controller v1.13.2+)
ingress_nginx_controller_strict_validate_path_type: true

# Trust X-Forwarded-* headers (real client IP/proto)
ingress_nginx_use_forwarded_headers: true

# Enable metrics
ingress_nginx_metrics_enabled: "{{ metrics_enabled }}"
ingress_nginx_metrics_service_monitor_enabled: "{{ metrics_enabled }}"

# Additional controller arguments
ingress_nginx_controller_additional_args: []

# Node selector and tolerations
ingress_nginx_node_selector: {}
ingress_nginx_tolerations: []
