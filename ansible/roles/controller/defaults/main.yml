# Controller config
controller_version: "0.11.0"
controller_image: "sagaxyz/controller:{{ controller_version }}"
controller_resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2"
chainlet_template_dest: "/tmp/chainlet.yml.tmpl"
controller_lb_port_limit: 1000

# Chainlet vars
controller_chainlet_resources:
  requests:
    memory: "1Gi"
    cpu: "0.5"
  limits:
    memory: "4Gi"
    cpu: "2"
controller_chainlet_pruning_strategy: "default"

# SSC vars
controller_ssc_grpc: "http://ssc.sagasrv-ssc.svc.cluster.local:9090"
controller_ssc_rpc: "http://ssc.sagasrv-ssc.svc.cluster.local:26657"

# Relayer vars
controller_relayer_enabled: false
controller_relayer_version: "0.4.4"
controller_relayer_wait_time: "0"
controller_relayer_resources:
  requests:
    memory: "75Mi"
    cpu: "0.08"
  limits:
    memory: "500Mi"
    cpu: "0.2"

# Load Balancer Configuration
controller_chainlet_external_traffic_policy: Cluster
controller_chainlet_allocate_loadbalancer_node_ports: false

# Additional services
controller_chainlet_ingress_enabled: false
controller_chainlet_ingress_url_suffixes: []
controller_chainlet_cosmos_exporter_enabled: false

# Debug options
controller_override_start_script: false
controller_start_script_path: ""